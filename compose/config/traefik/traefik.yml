global:
  checkNewVersion: false
  sendAnonymousUsage: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
  metrics:
    address: ":8080"

# Prometheus metrics on a dedicated internal entrypoint (port 8080, no TLS).
# Prometheus scrapes traefik:8080 directly over the Docker bridge.
# External access via traefik.${DOMAIN}/metrics is routed by the compose label
# (traefik-metrics router → loadbalancer → port 8080 on this container).
metrics:
  prometheus:
    entryPoint: metrics
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true

accessLog: {}
log:
  level: INFO

providers:
  docker:
    exposedByDefault: false
    network: cashtrack-app
    watch: true
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true
