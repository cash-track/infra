# Alertmanager 0.27 config. The telegram receiver pulls bot_token / chat_id at
# startup from the env_file (`secrets/alertmanager.env`). `{{ env "..." }}` is
# the alertmanager template syntax for environment substitution available in
# 0.26+ — values stay out of disk-resident YAML.

global:
  resolve_timeout: 5m

templates:
  - /etc/alertmanager/templates/*.tmpl

route:
  receiver: telegram
  group_by: ["alertname", "severity"]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 30m
  routes:
    # Critical: page faster (re-send every 15m until resolved).
    - matchers:
        - severity = "critical"
      receiver: telegram
      group_wait: 0s
      repeat_interval: 15m
      continue: false
    # Warning: default cadence inherited from root, kept explicit for clarity.
    - matchers:
        - severity = "warning"
      receiver: telegram
      repeat_interval: 30m
      continue: false
    # Info: low-noise channel — re-send only every 6h.
    - matchers:
        - severity = "info"
      receiver: telegram
      repeat_interval: 6h
      continue: false

receivers:
  - name: telegram
    telegram_configs:
      - bot_token: '{{ env "ALERTMANAGER_TELEGRAM_BOT_TOKEN" }}'
        chat_id: '{{ env "ALERTMANAGER_TELEGRAM_CHAT_ID" | toInt64 }}'
        api_url: https://api.telegram.org
        parse_mode: HTML
        message: '{{ template "telegram.cash-track.message" . }}'
        send_resolved: true

# Suppress lower-severity duplicates of the same alert on the same instance
# (e.g. silence HostMemoryPressure warning while a NodeHighMemoryUsage critical
# is firing for the same droplet).
inhibit_rules:
  - source_matchers: [severity = "critical"]
    target_matchers: [severity = "warning"]
    equal: ["alertname", "instance"]
  - source_matchers: [severity = "critical"]
    target_matchers: [severity = "info"]
    equal: ["alertname", "instance"]
  - source_matchers: [severity = "warning"]
    target_matchers: [severity = "info"]
    equal: ["alertname", "instance"]
