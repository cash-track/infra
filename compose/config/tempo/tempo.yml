# Single-binary Tempo config; aligned with the 3 GB disk slice / 72h retention
# from design §5 + §15.

stream_over_http_enabled: true

server:
  http_listen_port: 3200
  grpc_listen_port: 9095
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          # OTLP gRPC. api / gateway / website target tempo:4317 — that port
          # is owned by the otel-collector sidecar (which shares this network
          # namespace via `network_mode: service:tempo`). The sidecar applies
          # tail-sampling (drops healthcheck spans) and forwards here on 4319.
          # Bind to loopback only so the receiver isn't reachable directly
          # from outside the shared netns.
          endpoint: 127.0.0.1:4319

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    # Total Tempo retention. compactor sweeps blocks older than this.
    block_retention: 72h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

# No metrics-generator: the local Prometheus does not run remote_write as a
# server, and self-generated histograms aren't worth the extra storage on a
# single-droplet deploy.

overrides:
  max_traces_per_user: 50000
  max_bytes_per_trace: 5000000
