---
- name: Cash-Track production droplet bootstrap
  hosts: prod
  become: true
  serial: 1
  pre_tasks:
    - name: Wait for cloud-init sentinel
      ansible.builtin.wait_for:
        path: /var/lib/bootstrap-ready
        timeout: 300
  roles:
    - { role: base, tags: [base] }
    - { role: docker, tags: [docker] }
    - { role: tailscale, tags: [tailscale] }
    - { role: volume, tags: [volume] }
    - { role: compose-render, tags: [compose, render] }
    - { role: compose-up, tags: [compose, up] }
    - { role: mysql-init, tags: [mysql, compose] }
