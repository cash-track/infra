---
# One handler per secret_files entry. Triggered when an env file's content
# differs from the prior render (Ansible compares hashes on `copy`). Each
# handler restarts only its service via `docker_compose_v2 services: [...]
# restarted: true`. The compose project is the static `/opt/cashtrack` set up
# by compose-up.

- name: Restart api
  community.docker.docker_compose_v2:
    project_src: "{{ droplet_project_dir }}"
    files: "{{ compose_files }}"
    services: [api]
    state: restarted

- name: Restart gateway
  community.docker.docker_compose_v2:
    project_src: "{{ droplet_project_dir }}"
    files: "{{ compose_files }}"
    services: [gateway]
    state: restarted

