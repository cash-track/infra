---
# Vault prefix used by every `op://` reference in env templates. Group_vars/all
# already carries `secret_files`; the same list is mirrored here as a default
# so the role is usable in isolation (e.g. dry-run from a sandbox playbook).
op_prefix: "op://cash-track-prod"

# Local control-node directories. `render_dir` holds plaintext .env material
# for the duration of the play, then is wiped.
render_dir: /tmp/cashtrack-render

# Target layout on the droplet. Matches design §7 "droplet-side file layout".
droplet_project_dir: /opt/cashtrack
droplet_secrets_dir: "{{ droplet_project_dir }}/secrets"
droplet_traefik_dir: "{{ droplet_project_dir }}/config/traefik"

# Mirrors group_vars/all/main.yml. Bare names — `.env.tpl` and `.env` suffixes
# are appended at template-load and copy time.
secret_files:
  - api
  - gateway
  - frontend
  - website
  - mysql
  - mysql-backup
  - mysql-backup-crashers
  - mysql-exporter
  - grafana
  - crashers-bot
  - home-exporter
  - potwora
  - potwora-backup

# Non-env secret artefacts — config files that mix structural YAML with op://
# references. Each entry: a Jinja template under `templates/`, a destination
# under `{{ droplet_secrets_dir }}/`, and the compose service to restart on
# change. Same render → op inject → ship pipeline as `secret_files`.
# Optional `owner`/`group` override the default `ops:ops` ownership; needed when
# the consuming container runs as a non-root UID and reads the file via a
# bind-mount (e.g. alertmanager runs as 65534/nobody).
secret_config_files:
  - template: home-exporter.config.yml.tpl
    dest: home-exporter/config.yml
    service: home-exporter
  - template: alertmanager.yml.tpl
    dest: alertmanager/alertmanager.yml
    service: alertmanager
    owner: "65534"
    group: "65534"
  - template: alertmanager.bot_token.tpl
    dest: alertmanager/bot_token
    service: alertmanager
    owner: "65534"
    group: "65534"

# Cloudflare Origin Certificates rendered into Traefik's config dir. One entry
# per CF zone — each zone has its own Origin Certificate (CF issues per-zone),
# stored in its own 1Password item with two file attachments (`origin-cert.pem`,
# `origin-key.pem`). Traefik's file provider picks the right cert per request
# by SNI, so adding a domain = add a cert pair here + a `tls.certificates`
# entry in `compose/config/traefik/dynamic.yml`.
#
# `name` is used both as the on-droplet filename stem (`<name>-cert.pem`,
# `<name>-key.pem` under `{{ droplet_traefik_dir }}`) and as the loop label —
# keep it filesystem-safe (lowercase, hyphens). Don't use the bare domain with
# dots: it makes the resulting filenames look like wildcards.
cf_origin_certs:
  - name: cash-track-app
    cert_op_ref: "op://cash-track-prod/cloudflare-origin-cert/origin-cert.pem"
    key_op_ref: "op://cash-track-prod/cloudflare-origin-cert/origin-key.pem"
  - name: potwora-com-ua
    cert_op_ref: "op://cash-track-prod/cloudflare-origin-cert-potwora/origin-cert.pem"
    key_op_ref: "op://cash-track-prod/cloudflare-origin-cert-potwora/origin-key.pem"
