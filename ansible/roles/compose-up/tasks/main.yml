---
# Ships the static compose files, per-service config, and the on-droplet
# `deploy-service` helper, then brings the full stack up. compose-render runs
# before this role to populate `secrets/` and the top-level `.env`; mysql-init
# runs after to apply DB grants against the now-running mysql container.

- name: Ensure droplet project subdirectories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: ops
    group: ops
    mode: "0755"
  loop:
    - "{{ droplet_project_dir }}"
    - "{{ droplet_bin_dir }}"
    - "{{ droplet_config_dir }}"

- name: Upload compose files
  ansible.builtin.copy:
    src: "{{ compose_source_dir }}/{{ item }}"
    dest: "{{ droplet_project_dir }}/{{ item }}"
    owner: ops
    group: ops
    mode: "0644"
  loop: "{{ compose_files }}"

- name: Upload per-service config tree
  ansible.builtin.command:
    argv:
      - rsync
      - --archive
      - --delete
      - "--exclude=*.pem"
      - -e
      - "ssh -o StrictHostKeyChecking=no"
      - "{{ compose_source_dir }}/config/"
      - "{{ ansible_user }}@{{ ansible_host }}:{{ droplet_config_dir }}/"
  delegate_to: localhost
  become: false
  changed_when: true
  notify: Reload Prometheus

- name: Fix config tree ownership
  ansible.builtin.file:
    path: "{{ droplet_config_dir }}"
    state: directory
    owner: ops
    group: ops
    recurse: true

- name: Install deploy-service script
  ansible.builtin.copy:
    src: deploy-service
    dest: "{{ droplet_bin_dir }}/deploy-service"
    owner: root
    group: root
    mode: "0755"

- name: Prune stopped containers
  ansible.builtin.command:
    cmd: docker container prune -f
  changed_when: false

- name: Prune unused networks
  ansible.builtin.command:
    cmd: docker network prune -f
  changed_when: false

- name: Compose up (pull missing, remove orphans)
  community.docker.docker_compose_v2:
    project_src: "{{ droplet_project_dir }}"
    files: "{{ compose_files }}"
    state: present
    remove_orphans: true
    pull: missing
