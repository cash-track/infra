---
# Single shared application user. Granted on every database in the list below.
# Per-app users is a future hardening step (design §2 "MySQL tenant model").
app_user:
  user_op_ref: "op://cash-track-prod/mysql/MYSQL_USER"
  password_op_ref: "op://cash-track-prod/mysql/MYSQL_PASSWORD"

# Adding a new application = append its DB name and re-run `site.yml --tags mysql`.
# No new vault item, no new MySQL user.
databases:
  - cashtrack
  - telegram_bots
