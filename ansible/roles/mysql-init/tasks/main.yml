---
# Idempotent: creates a dedicated MySQL user per application and grants ALL
# PRIVILEGES on that application's database(s) only. Monitoring users (e.g.
# mysql-exporter) are provisioned separately with read-only global grants.
#
# Security model: each service gets its own MySQL user scoped to its own
# database(s). A compromised service cannot read or write any other service's data.
#
# Runs after compose-up has started the mysql container. We talk to mysql via
# `docker exec` rather than over the network because the container doesn't
# publish 3306 to the host (only the cashtrack-app docker network).
#
# Secrets (root password, per-user credentials) are resolved on the control node
# via `op read` and passed into mysql exclusively through the `MYSQL_PWD`
# environment variable — never on the command line, never written to disk.

- name: Load database list
  ansible.builtin.include_vars:
    file: databases.yml

- name: Resolve mysql root password from 1Password
  ansible.builtin.command:
    cmd: "op read {{ mysql_root_password_op_ref }}"
  delegate_to: localhost
  become: false
  environment:
    OP_SERVICE_ACCOUNT_TOKEN: "{{ lookup('env', 'OP_SERVICE_ACCOUNT_TOKEN') }}"
  register: mysql_init_root_pw
  changed_when: false
  no_log: true

- name: Resolve usernames from 1Password
  ansible.builtin.command:
    cmd: "op read {{ item.user_op_ref }}"
  delegate_to: localhost
  become: false
  environment:
    OP_SERVICE_ACCOUNT_TOKEN: "{{ lookup('env', 'OP_SERVICE_ACCOUNT_TOKEN') }}"
  loop: "{{ app_users }}"
  loop_control:
    label: "{{ item.name }}"
  register: mysql_init_resolved_users
  changed_when: false
  no_log: true

- name: Resolve passwords from 1Password
  ansible.builtin.command:
    cmd: "op read {{ item.password_op_ref }}"
  delegate_to: localhost
  become: false
  environment:
    OP_SERVICE_ACCOUNT_TOKEN: "{{ lookup('env', 'OP_SERVICE_ACCOUNT_TOKEN') }}"
  loop: "{{ app_users }}"
  loop_control:
    label: "{{ item.name }}"
  register: mysql_init_resolved_passwords
  changed_when: false
  no_log: true

- name: Combine credentials into user facts
  ansible.builtin.set_fact:
    mysql_user_credentials: >-
      {{ mysql_user_credentials | default([]) + [{
        'username': mysql_init_resolved_users.results[loop_index].stdout,
        'password': mysql_init_resolved_passwords.results[loop_index].stdout,
        'databases': item.databases
      }] }}
  loop: "{{ app_users }}"
  loop_control:
    index_var: loop_index
    label: "{{ item.name }}"
  no_log: true

- name: Wait for mysql container to report healthy
  ansible.builtin.command:
    argv:
      - docker
      - inspect
      - --format
      - '{{ "{{" }}.State.Health.Status{{ "}}" }}'
      - "{{ mysql_container }}"
  register: mysql_init_health
  changed_when: false
  retries: "{{ (mysql_init_wait_seconds / 5) | int }}"
  delay: 5
  until: mysql_init_health.stdout == "healthy"

- name: Apply user creation + database grants via mysql client
  ansible.builtin.shell: |
    set -euo pipefail
    docker exec -i -e MYSQL_PWD "{{ mysql_container }}" \
      mysql -uroot -N -B <<'SQL'
    {% for u in mysql_user_credentials %}
    CREATE USER IF NOT EXISTS '{{ u.username }}'@'%' IDENTIFIED BY '{{ u.password }}';
    ALTER  USER '{{ u.username }}'@'%' IDENTIFIED BY '{{ u.password }}';
    {% for db in u.databases %}
    CREATE DATABASE IF NOT EXISTS `{{ db }}` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    GRANT ALL PRIVILEGES ON `{{ db }}`.* TO '{{ u.username }}'@'%';
    {% endfor %}
    {% endfor %}
    FLUSH PRIVILEGES;
    SQL
  environment:
    MYSQL_PWD: "{{ mysql_init_root_pw.stdout }}"
  # Idempotent SQL — always exits 0 on success regardless of whether
  # IF NOT EXISTS short-circuited. Reported unchanged on success; safe to re-run.
  args:
    executable: /bin/bash
  changed_when: false
  no_log: true

- name: Resolve monitoring user passwords from 1Password
  ansible.builtin.command:
    cmd: "op read {{ item.password_op_ref }}"
  delegate_to: localhost
  become: false
  environment:
    OP_SERVICE_ACCOUNT_TOKEN: "{{ lookup('env', 'OP_SERVICE_ACCOUNT_TOKEN') }}"
  loop: "{{ monitoring_users }}"
  loop_control:
    label: "{{ item.name }}"
  register: mysql_init_monitoring_passwords
  changed_when: false
  no_log: true

- name: Combine monitoring credentials into user facts
  ansible.builtin.set_fact:
    mysql_monitoring_credentials: >-
      {{ mysql_monitoring_credentials | default([]) + [{
        'username': item.username,
        'password': mysql_init_monitoring_passwords.results[loop_index].stdout
      }] }}
  loop: "{{ monitoring_users }}"
  loop_control:
    index_var: loop_index
    label: "{{ item.name }}"
  no_log: true

- name: Apply monitoring user creation + global read grants via mysql client
  ansible.builtin.shell: |
    set -euo pipefail
    docker exec -i -e MYSQL_PWD "{{ mysql_container }}" \
      mysql -uroot -N -B <<'SQL'
    {% for u in mysql_monitoring_credentials %}
    CREATE USER IF NOT EXISTS '{{ u.username }}'@'%' IDENTIFIED BY '{{ u.password }}';
    ALTER  USER '{{ u.username }}'@'%' IDENTIFIED BY '{{ u.password }}';
    GRANT PROCESS, REPLICATION CLIENT, SELECT ON *.* TO '{{ u.username }}'@'%';
    {% endfor %}
    FLUSH PRIVILEGES;
    SQL
  environment:
    MYSQL_PWD: "{{ mysql_init_root_pw.stdout }}"
  args:
    executable: /bin/bash
  changed_when: false
  no_log: true
