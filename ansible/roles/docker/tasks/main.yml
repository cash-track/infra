---
# Docker engine itself is installed by cloud-init. This role configures the
# daemon: log rotation caps so a chatty container can't fill the root disk.
- name: Ensure /etc/docker exists
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render /etc/docker/daemon.json
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        }
      }
  notify: Restart docker

- name: Ensure docker is enabled and running
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Prevent needrestart from auto-restarting Docker and containerd on package upgrades
  ansible.builtin.copy:
    dest: /etc/needrestart/conf.d/99-docker.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      # unattended-upgrades uses needrestart to restart services after package
      # upgrades. Restarting containerd stops Docker, which kills all containers.
      # Override: never auto-restart Docker or containerd — bring them up manually.
      $nrconf{override_rc}{qr/^(docker|containerd)\.service$/} = 0;
