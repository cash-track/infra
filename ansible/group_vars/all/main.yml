---
# Image tags used verbatim — passed straight to `docker pull`. No `v`-stripping,
# no normalization. If a release is published as `v1.2.9`, that exact string is
# the tag both in `.env` and in `docker pull cashtrack/api:v1.2.9`.
versions:
  api: "1.9.13"
  gateway: "1.3.3"
  frontend: "1.9.1"
  website: "2.1.9"
  mysql: "1.0.17"
  mysql_backup: "0.0.11"
  redis: "1.0.6"
  # crashers-bot and home-exporter live in repos outside the cash-track org;
  # their images are pulled from `vovanms/*` on Docker Hub (public). Tags here
  # track the upstream tag the operator wants pinned on the droplet — bumped
  # by hand when vovanms publishes a new release. They are NOT released through
  # the org `ship-service.yml` workflow.
  crashers_bot: "1.3.3"
  home_exporter: "0.0.4"
  # vovanms/wordpress-backup image, used by the potwora-backup service.
  # Built from potwora/deploy/Dockerfile.backup and pushed manually
  # (same pattern as crashers_bot / home_exporter).
  potwora_backup: "1.0.3"

retention:
  prometheus: "7d"
  loki: "168h"
  tempo: "72h"

backups:
  spaces_endpoint: "ams3.digitaloceanspaces.com"
  spaces_bucket: "cash-track-backups"
  schedule_cron: "0 0 3 * * *"

# Compose files rendered/used by the compose-* roles (paths under /opt/cashtrack).
# Stage 4 fills these out; Stage 5 wires them into compose-up.
compose_files:
  - compose.core.yml
  - compose.app.yml
  - compose.obs.yml
  - compose.telegram.yml
  - compose.potwora.yml

# Per-service env files rendered by compose-render into /opt/cashtrack/secrets/<name>.env.
# Bare names (no `.env`) — the role appends the suffix at template-load and copy time.
secret_files:
  - api
  - gateway
  - frontend
  - website
  - mysql
  - mysql-backup
  - mysql-backup-crashers
  - mysql-exporter
  - grafana
  - crashers-bot
  - home-exporter
  - potwora
  - potwora-backup

# Cloudflare Origin Certificates rendered into Traefik's config dir. One entry
# per CF zone — each zone has its own Origin Certificate (CF issues per-zone),
# stored in its own 1Password item with `origin-cert.pem` + `origin-key.pem`
# attachments. Traefik's file provider selects the right cert per request by
# SNI; adding a domain = add an item here + a `tls.certificates` entry in
# `compose/config/traefik/dynamic.yml`. `name` is the on-droplet filename stem.
cf_origin_certs:
  - name: cash-track-app
    cert_op_ref: "op://cash-track-prod/cloudflare-origin-cert/origin-cert.pem"
    key_op_ref: "op://cash-track-prod/cloudflare-origin-cert/origin-key.pem"
  - name: potwora-com-ua
    cert_op_ref: "op://cash-track-prod/cloudflare-origin-cert-potwora/origin-cert.pem"
    key_op_ref: "op://cash-track-prod/cloudflare-origin-cert-potwora/origin-key.pem"

# Per-service secret config files (YAML, JSON, etc.) rendered the same way as
# secret_files: Jinja → op inject → 0600 file under /opt/cashtrack/secrets/.
# Optional `owner`/`group` override the default `ops:ops` ownership when the
# consuming container reads the file as a non-root UID via a bind-mount.
secret_config_files:
  - template: home-exporter.config.yml.tpl
    dest: home-exporter/config.yml
    service: home-exporter
  - template: alertmanager.yml.tpl
    dest: alertmanager/alertmanager.yml
    service: alertmanager
    owner: "65534"
    group: "65534"
  - template: alertmanager.bot_token.tpl
    dest: alertmanager/bot_token
    service: alertmanager
    owner: "65534"
    group: "65534"

# Service set currently expected to be running on the droplet. Stage 3 leaves this
# empty — roles guard optional behaviour (e.g. `tailscale serve` for grafana) on
# membership in this list.
compose_services: [mysql, redis, prometheus, alertmanager, grafana]

# Volume subdir → owner UID. Matches upstream image runtime users.
volume_subdir_owners:
  mysql: 999
  prometheus: 65534
  loki: 10001
  tempo: 10001
  grafana: 472
  alertmanager: 65534
  potwora: 33  # www-data; matches K8s fsGroup: 33 on serversideup/php image
