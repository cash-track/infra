[defaults]
inventory = ./inventory/prod/terraform.sh
host_key_checking = False
stdout_callback = default
result_format = yaml
gathering = smart
retry_files_enabled = False
roles_path = ./roles
interpreter_python = /usr/bin/python3

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
pipelining = True
