---
# Restore a MySQL dump from the `crashers-bot-backups` Spaces bucket into the
# running mysql container (crashers_bot database).
# Parameterized by `backup_id` (object key at the bucket root) or the
# literal "latest" — in which case the playbook resolves the newest object.
#
# Destructive by design (rewrites tables). Guard with explicit operator
# confirmation. Row-count snapshots are captured before AND after the restore.
#
# Usage:
#   ansible-playbook ops/backup-restore-crashers.yml -e backup_id=cashtrack-2026-04-25.sql.gz
#   ansible-playbook ops/backup-restore-crashers.yml -e backup_id=latest
#   ansible-playbook ops/backup-restore-crashers.yml -e backup_id=latest -e verify_only=true
#
# `verify_only=true` resolves the latest object, prints its key + age, and
# exits without touching MySQL.

- name: Restore crashers_bot MySQL backup
  hosts: prod
  become: true
  vars_files:
    - ../group_vars/all/main.yml
  vars:
    bucket: "crashers-bot-backups"
    s3_endpoint: "https://{{ backups.spaces_endpoint }}"
    droplet_project_dir: /opt/cashtrack
    mysql_root_password_op_ref: "op://cash-track-prod/mysql/MYSQL_ROOT_PASSWORD"
    mysql_container: cashtrack-mysql-1
    verify_tables:
      - users
      - chats
      - chats_users
      - pidar_history_logs
      - migrations
  pre_tasks:
    - name: Resolve mysql root password from 1Password
      ansible.builtin.command:
        cmd: "op read {{ mysql_root_password_op_ref }}"
      delegate_to: localhost
      become: false
      environment:
        OP_SERVICE_ACCOUNT_TOKEN: "{{ lookup('env', 'OP_SERVICE_ACCOUNT_TOKEN') }}"
      register: crashers_restore_root_pw
      changed_when: false
      no_log: true

    - name: Validate backup_id
      ansible.builtin.assert:
        that: backup_id is defined and backup_id | length > 0
        fail_msg: "Pass `-e backup_id=<key>` or `-e backup_id=latest`."

    - name: Confirm operator intent
      ansible.builtin.pause:
        prompt: |
          About to restore '{{ backup_id }}' from s3://{{ bucket }}/ over
          the crashers_bot database on {{ inventory_hostname }}. This OVERWRITES tables.
          Type 'restore' to continue, anything else to abort.
      register: crashers_restore_confirm
      when: not (verify_only | default(false) | bool)

    - name: Abort if not confirmed
      ansible.builtin.fail:
        msg: "Operator did not confirm — aborting."
      when:
        - not (verify_only | default(false) | bool)
        - crashers_restore_confirm.user_input | default('') != 'restore'
  tasks:
    - name: Resolve `latest` to a concrete object key
      ansible.builtin.shell: |
        set -euo pipefail
        docker compose -f compose.core.yml -f compose.telegram.yml exec -T mysql-backup-crashers \
          aws --endpoint-url={{ s3_endpoint }} s3 ls "s3://{{ bucket }}/" \
          | awk '{print $4}' | sort | tail -n1
      args:
        chdir: "{{ droplet_project_dir }}"
        executable: /bin/bash
      register: crashers_latest_key_lookup
      changed_when: false
      when: backup_id == 'latest'

    - name: Pin resolved backup key
      ansible.builtin.set_fact:
        resolved_backup: >-
          {{ crashers_latest_key_lookup.stdout if backup_id == 'latest' else backup_id }}

    - name: Read backup object metadata for verify_only mode
      ansible.builtin.shell: |
        set -euo pipefail
        docker compose -f compose.core.yml -f compose.telegram.yml exec -T mysql-backup-crashers \
          aws --endpoint-url={{ s3_endpoint }} s3 ls "s3://{{ bucket }}/{{ resolved_backup }}"
      args:
        chdir: "{{ droplet_project_dir }}"
        executable: /bin/bash
      register: crashers_verify_listing
      changed_when: false
      when: verify_only | default(false) | bool

    - name: Verify-only summary
      ansible.builtin.debug:
        msg:
          - "verify_only=true — skipping restore."
          - "resolved key: {{ resolved_backup }}"
          - "object listing: {{ crashers_verify_listing.stdout | default('(unknown)') }}"
      when: verify_only | default(false) | bool

    - name: End play in verify_only mode
      ansible.builtin.meta: end_play
      when: verify_only | default(false) | bool

    - name: Pre-restore row counts
      ansible.builtin.shell: |
        set -euo pipefail
        docker compose -f compose.core.yml -f compose.telegram.yml exec -T -e MYSQL_PWD mysql \
          mysql -uroot --batch --skip-column-names crashers_bot \
          -e "SELECT '{{ item }}', COUNT(*) FROM \`{{ item }}\`;"
      args:
        chdir: "{{ droplet_project_dir }}"
        executable: /bin/bash
      environment:
        MYSQL_PWD: "{{ crashers_restore_root_pw.stdout }}"
      loop: "{{ verify_tables }}"
      register: crashers_counts_before
      changed_when: false
      ignore_errors: true
      no_log: true

    - name: Download backup to /tmp inside mysql-backup-crashers container
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - -f
          - compose.core.yml
          - -f
          - compose.telegram.yml
          - exec
          - -T
          - mysql-backup-crashers
          - aws
          - "--endpoint-url={{ s3_endpoint }}"
          - s3
          - cp
          - "s3://{{ bucket }}/{{ resolved_backup }}"
          - /tmp/restore.sql.gz
      args:
        chdir: "{{ droplet_project_dir }}"
      changed_when: true

    - name: Apply restore (gunzip → mysql, root password from env)
      ansible.builtin.shell: |
        set -euo pipefail
        docker compose -f compose.core.yml -f compose.telegram.yml exec -T mysql-backup-crashers \
          gunzip -c /tmp/restore.sql.gz \
          | docker compose -f compose.core.yml -f compose.telegram.yml exec -T -e MYSQL_PWD mysql \
              mysql -uroot crashers_bot
      args:
        chdir: "{{ droplet_project_dir }}"
        executable: /bin/bash
      environment:
        MYSQL_PWD: "{{ crashers_restore_root_pw.stdout }}"
      changed_when: true
      no_log: true

    - name: Post-restore row counts
      ansible.builtin.shell: |
        set -euo pipefail
        docker compose -f compose.core.yml -f compose.telegram.yml exec -T -e MYSQL_PWD mysql \
          mysql -uroot --batch --skip-column-names crashers_bot \
          -e "SELECT '{{ item }}', COUNT(*) FROM \`{{ item }}\`;"
      args:
        chdir: "{{ droplet_project_dir }}"
        executable: /bin/bash
      environment:
        MYSQL_PWD: "{{ crashers_restore_root_pw.stdout }}"
      loop: "{{ verify_tables }}"
      register: crashers_counts_after
      changed_when: false
      no_log: true

    - name: Restore complete — review row-count deltas
      ansible.builtin.debug:
        msg:
          - "Restored: {{ resolved_backup }}"
          - "Before:   {{ crashers_counts_before.results | map(attribute='stdout', default='(no data)') | list }}"
          - "After:    {{ crashers_counts_after.results | map(attribute='stdout') | list }}"
