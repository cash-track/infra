name: bootstrap

on:
  workflow_dispatch:

concurrency:
  group: bootstrap-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform / apply
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout infra
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@143a85f84a90555d121cde2ff5872e393a47ab9f  # v1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
        with:
          terraform_version: "~> 1.10"

      - name: Terraform init
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_TFSTATE_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_TFSTATE_KEY }}
        run: |
          terraform init \
            -backend-config="endpoints={s3=\"https://ams3.digitaloceanspaces.com\"}" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_metadata_api_check=true" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_s3_checksum=true" \
            -backend-config="use_path_style=true"

      - name: Terraform apply
        working-directory: terraform
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_TFSTATE_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_TFSTATE_KEY }}
          DIGITALOCEAN_TOKEN: op://cash-track-prod/do-api/TOKEN
          TF_VAR_tailscale_oauth_client_id: op://cash-track-prod/tailscale/OAUTH_CLIENT_ID
          TF_VAR_tailscale_oauth_client_secret: op://cash-track-prod/tailscale/OAUTH_CLIENT_SECRET
        run: |
          set -eo pipefail
          op run -- terraform apply -auto-approve -json | jq -r '
            if   .type == "apply_start"    then "  applying: " + .hook.resource.addr
            elif .type == "apply_complete" then "  done:     " + .hook.resource.addr
            elif .type == "apply_errored"  then "  error:    " + .hook.resource.addr
            elif .type == "change_summary" then
              "summary: \(.changes.add) add, \(.changes.change) change, \(.changes.remove) destroy"
            elif .type == "diagnostic" then
              "[\(.diagnostic.severity)] \(.diagnostic.summary)"
            else empty end
          '

      - name: Mask Terraform outputs
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_TFSTATE_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_TFSTATE_KEY }}
        run: |
          terraform output -json | jq -r 'to_entries[] | .value.value | tostring' | while read -r val; do
            echo "::add-mask::$val"
          done

  ansible:
    name: Ansible
    needs: terraform
    uses: cash-track/.github/.github/workflows/ansible.yml@main
    secrets: inherit
