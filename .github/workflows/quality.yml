name: quality

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: "~> 1.10"

      - name: Terraform init (no backend)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform format check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

  ansible:
    name: Ansible lint + syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install Ansible and lint
        working-directory: ansible
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core>=2.17" "ansible-lint>=24.0"
          ansible-galaxy collection install -r requirements.yml

      - name: Syntax check
        working-directory: ansible
        run: |
          fixture="$(cat inventory/prod/fixtures/tf-output.json)"
          TF_OUTPUT="$fixture" ansible-playbook site.yml --syntax-check
          TF_OUTPUT="$fixture" ansible-playbook deploy.yml --syntax-check
          TF_OUTPUT="$fixture" ansible-playbook replace-droplet.yml --syntax-check
          for f in ops/*.yml; do
            TF_OUTPUT="$fixture" ansible-playbook "$f" --syntax-check
          done

      - name: ansible-lint
        working-directory: ansible
        run: |
          ansible-lint site.yml deploy.yml replace-droplet.yml ops/*.yml
