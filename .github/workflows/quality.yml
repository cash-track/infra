name: quality

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
        with:
          terraform_version: "~> 1.10"

      - name: Terraform init (no backend)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform format check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

  ansible:
    name: Ansible lint + syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Ansible and lint
        working-directory: ansible
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core>=2.17" "ansible-lint>=24.0"
          ansible-galaxy collection install -r requirements.yml

      - name: Syntax check
        working-directory: ansible
        run: |
          fixture='{"reserved_ip":{"value":"192.0.2.1"},"droplet_id":{"value":"123456"},"tailscale_hostname":{"value":"cashtrack-prod"},"volume_id":{"value":"vol-abc123"}}'
          TF_OUTPUT="$fixture" ansible-playbook site.yml --syntax-check
          TF_OUTPUT="$fixture" ansible-playbook deploy.yml --syntax-check
          TF_OUTPUT="$fixture" ansible-playbook replace-droplet.yml --syntax-check
          for f in ops/*.yml; do
            TF_OUTPUT="$fixture" ansible-playbook "$f" --syntax-check
          done

      - name: ansible-lint
        working-directory: ansible
        run: |
          ansible-lint site.yml deploy.yml replace-droplet.yml ops/*.yml
